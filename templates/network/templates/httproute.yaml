apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.route.name }}
  namespace: {{ .Values.namespace }}

spec:
  parentRefs:
    - name: {{ .Values.route.parentRefName }}

  hostnames:
{{- range .Values.route.hostnames }}
    - {{ . | quote }}
{{- end }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.route.pathPrefix }}

      backendRefs:
        - name: {{ .Values.route.backend.name }}
          port: {{ .Values.route.backend.port }}