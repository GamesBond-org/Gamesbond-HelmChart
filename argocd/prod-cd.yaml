apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gamesbond-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/GamesBond-org/Gamesbond-HelmChart.git
    targetRevision: main
    path: umbrella
    helm:
      valueFiles:
        - values.yaml
        - prodvalues.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true