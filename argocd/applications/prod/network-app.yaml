apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gamesbond-network-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourusername/Gamesbond-HelmChart
    targetRevision: main
    path: templates/network
    helm:
      valueFiles:
      - values.yaml
      - prodvalues.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
