apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.redis.name }}

spec:
  serviceName: {{ .Values.redis.name }}
  replicas: {{ .Values.redis.replicaCount }}

  selector:
    matchLabels:
      app: {{ .Values.redis.name }}

  template:
    metadata:
      labels:
        app: {{ .Values.redis.name }}

    spec:
      containers:
        - name: {{ .Values.redis.name }}
          image: "{{ .Values.redis.image.name }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.redis.service.targetPort }}

          envFrom:
            - configMapRef:
                name: {{ .Values.redis.name }}-config
            - secretRef:
                name: {{ .Values.redis.name }}-secret

          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}

          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false

          readinessProbe:
            tcpSocket:
              port: {{ .Values.redis.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: {{ .Values.redis.service.targetPort }}
            initialDelaySeconds: 15
            periodSeconds: 20

          volumeMounts:
            - name: redis-data
              mountPath: /data

      volumes:
        - name: redis-data
          emptyDir: {}