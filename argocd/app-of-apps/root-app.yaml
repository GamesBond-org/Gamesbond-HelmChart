apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gamesbond-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourusername/Gamesbond-HelmChart
    targetRevision: main
    path: argocd/applications/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
