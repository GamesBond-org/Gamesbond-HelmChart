apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gamesbond-redis-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourusername/Gamesbond-HelmChart
    targetRevision: main
    path: templates/redis
    helm:
      values: |
        namespace: dev
        redis:
          enabled: true
          replicas: 1
      valueFiles:
      - values.yaml
      - devvalues.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
