apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.route.name }}
  namespace: {{ .Values.namespace }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: {{ .Values.route.path }}
    backendRefs:
    - name: {{ .Values.route.backendName }}
      port: {{ .Values.route.backendPort }}
