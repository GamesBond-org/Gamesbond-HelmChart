apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gamesbond-route
  namespace: prod
spec:
  parentRefs:
    - name: gamesbond-gateway

  hostnames:
    - gamesbond.online
    - www.gamesbond.online

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

      backendRefs:
        - name: frontend-service
          port: 3000